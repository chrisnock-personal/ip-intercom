# Both plain HTTP (:80, mapped to host :8080) and TLS (:443, mapped to
# host :8443) serve identically — no forced redirect, so the existing
# localhost:8080 workflow keeps working unchanged. HTTPS is additive, for
# a genuinely remote desk machine (getUserMedia needs a secure context
# there; localhost is browser-exempted from that requirement, which is why
# plain HTTP has always been fine for local use).
#
# /ws proxies pbx-core's SIP-over-WebSocket listener (plain ws://, port
# 8088, network_mode: host — reached via host.containers.internal, same
# "same-host gotcha" as the Live view's pbx-core admin API) through this
# same nginx, at the same origin as the page. The turret derives its own
# wss://<host>/ws (or ws:// over plain HTTP) from window.location — see
# turret/src/sipUa.ts — rather than being handed a separate host/port.

server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    location /api/v1 {
        proxy_pass http://controller-backend:3100;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    location /ws {
        proxy_pass http://host.containers.internal:8088;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_read_timeout 3600s;
    }

    # Bare /turret (no trailing slash) would otherwise fall through to the
    # console SPA fallback below and silently serve the console's login form
    # instead — nginx prefix matching on /turret/ requires the trailing
    # slash. Redirect to the slashed form so it always hits the turret app.
    location = /turret {
        return 301 /turret/;
    }

    # Turret app (built into /usr/share/nginx/html/turret by the Containerfile's
    # second build stage) — a separate, unauthenticated-by-default page, not
    # part of the JWT-gated console SPA below.
    location /turret/ {
        try_files $uri $uri/ /turret/index.html;
    }

    # SPA fallback (console)
    location / {
        try_files $uri /index.html;
    }
}

server {
    listen 443 ssl;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    ssl_certificate     /etc/nginx/tls/cert.pem;
    ssl_certificate_key /etc/nginx/tls/key.pem;

    location /api/v1 {
        proxy_pass http://controller-backend:3100;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    location /ws {
        proxy_pass http://host.containers.internal:8088;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_read_timeout 3600s;
    }

    location = /turret {
        return 301 /turret/;
    }

    location /turret/ {
        try_files $uri $uri/ /turret/index.html;
    }

    location / {
        try_files $uri /index.html;
    }
}
